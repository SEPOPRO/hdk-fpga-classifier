name: HDK FPGA Build

on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      run_vivado:
        description: 'Run Vivado synthesis (requires AMD EULA acceptance)'
        required: false
        default: false
        type: boolean

jobs:
  yosys-synth:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install OSS CAD Suite
      run: |
        wget -q https://github.com/YosysHQ/oss-cad-suite-build/releases/download/2024-12-01/oss-cad-suite-linux-x64-20241201.tgz
        tar -xzf oss-cad-suite-linux-x64-20241201.tgz
        echo "$PWD/oss-cad-suite/bin" >> $GITHUB_PATH

    - name: Run Yosys synthesis
      run: |
        cd vhdl
        yosys -s hdk_synth_fast.ys 2>&1 | tee yosys_report.txt
        echo ""
        echo "=== RESOURCE SUMMARY ==="
        grep -E "(Number of cells|LUT|FF|ABC RESULTS)" yosys_report.txt | head -20

    - name: Synthesize parallel POPCOUNT tree
      run: |
        cd vhdl
        yosys -s synth_tree.ys 2>&1 | tee tree_synth.txt
        echo ""
        echo "=== TREE LUT COUNT ==="
        grep "ABC RESULTS" tree_synth.txt -A5 | head -10
        grep "\$lut" tree_synth.txt | head -5

    - name: Upload reports
      uses: actions/upload-artifact@v4
      with:
        name: hdk-reports
        path: |
          vhdl/yosys_report.txt
          vhdl/tree_synth.txt

  vivado-build:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_vivado == 'true'
    runs-on: [self-hosted, vivado]

    steps:
    - uses: actions/checkout@v4

    - name: Add Vivado to PATH
      shell: powershell
      run: |
        echo "C:\AMDDesignTools\2025.2\Vivado\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Run Vivado build
      shell: cmd
      run: |
        cd vivado_project_ready
        call "C:\AMDDesignTools\2025.2\Vivado\settings64.bat"
        vivado -mode batch -source build_hdk.tcl 2>&1

    - name: Parse results
      shell: powershell
      run: |
        cd vivado_project_ready
        Write-Host "=== UTILIZATION ==="
        Get-Content hdk_impl_utilization.rpt -TotalCount 40 | Select-String "Slice LUTs"
        Write-Host ""
        Write-Host "=== TIMING ==="
        Get-Content hdk_impl_timing.rpt -TotalCount 20 | Select-String "WNS|Design Timing"
        Write-Host ""
        Write-Host "=== POWER ==="
        Get-Content hdk_power.rpt -TotalCount 20 | Select-String "Total On-Chip|Junction"
        Write-Host ""
        Write-Host "=== SYNTHESIS UTILIZATION ==="
        Get-Content hdk_synth_utilization.rpt -TotalCount 40 | Select-String "Slice LUTs"

    - name: Upload Vivado reports
      uses: actions/upload-artifact@v4
      with:
        name: vivado-reports
        path: |
          vivado_project_ready/hdk_impl_utilization.rpt
          vivado_project_ready/hdk_impl_timing.rpt
          vivado_project_ready/hdk_power.rpt
          vivado_project_ready/hdk_synth_utilization.rpt
          vivado_project_ready/vivado_build.log

    - name: Upload bitstream
      uses: actions/upload-artifact@v4
      with:
        name: hdk-bitstream
        path: vivado_project_ready/*.bit
