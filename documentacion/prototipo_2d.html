<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HDK FPGA Board</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
<style>
body{margin:0;overflow:hidden;background:#0a0a14}
#panel{position:absolute;top:60px;left:12px;z-index:10}
.c{display:flex;align-items:center;gap:8px;padding:4px 10px;margin-bottom:1px;cursor:pointer;
border-left:2px solid transparent;background:rgba(8,8,16,0.6);border-radius:0 4px 4px 0;width:160px}
.c:hover{background:rgba(0,180,255,0.05)}
.c.s{background:rgba(0,180,255,0.1);border-left-color:#00b4ff}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.cn{color:rgba(255,255,255,0.7);font-size:10px}
.cd{color:rgba(255,255,255,0.2);font-size:8px}
#title{position:absolute;top:12px;left:50%;transform:translateX(-50%);color:#7788aa;font-size:16px;letter-spacing:3px;z-index:10;pointer-events:none}
#title span{color:#00b4ff}
#hint{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.2);font-size:10px;z-index:10;pointer-events:none}
</style>
</head>
<body>
<div id="title">HDK <span>FPGA</span> PROTOTYPE</div>
<div id="panel"></div>
<div id="hint">← → arrastra para rotar · clic en componentes</div>
<script>
const ITEMS = [
  {id:'pcb',name:'PCB Board',desc:'260×165mm · 8 layers',dot:'#0d1525'},
  {id:'fpga',name:'FPGA Artix-7',desc:'XC7A200T · ~70K LUTs',dot:'#2a3560'},
  {id:'bga',name:'BGA Balls',desc:'Gold interconnects',dot:'#ccb060'},
  {id:'leds',name:'Status LEDs',desc:'8 indicators',dot:'#00dd88'},
  {id:'usb',name:'USB Connector',desc:'FPGA interface',dot:'#1a2a44'},
  {id:'uart',name:'UART Bridge',desc:'10 Mbaud · 8N1',dot:'#181e2e'},
  {id:'power',name:'Power Regulator',desc:'1.0/1.8/3.3V',dot:'#222233'},
  {id:'pins',name:'Header Pins',desc:'GPIO 2×20',dot:'#888899'},
];

let rot = 0;
let sel = 'fpga';

function setup() {
  createCanvas(windowWidth, windowHeight);
  let pnl = select('#panel');
  ITEMS.forEach(it => {
    let d = createDiv(''); d.parent(pnl); d.class('c'); d.attribute('data-id',it.id);
    d.html(`<div class="dot" style="background:${it.dot}"></div><div><div class="cn">${it.name}</div><div class="cd">${it.desc}</div></div>`);
    d.mouseClicked(() => { sel=it.id; selectAll('.c').forEach(e=>e.removeClass('s')); d.addClass('s'); });
  });
  select('.c').addClass('s');
}

// Simple perspective projection
// Input: 3D point (x,y,z), Output: screen [sx,sy]
function proj(x, y, z) {
  // Rotate around Y axis
  let c = cos(rot), s = sin(rot);
  let rx = x * c + z * s;
  let rz = -x * s + z * c;
  // Isometric-like projection
  let sx = (rx - rz) * 0.7;
  let sy = -(rx + rz) * 0.4 + y * 0.7;
  return [sx, sy];
}

function p(x,y,z){return proj(x,y,z)}

function quad(pts, col, st, sw) {
  fill(col[0],col[1],col[2]);
  if(st){stroke(st[0],st[1],st[2]);strokeWeight(sw||0.5)}else noStroke();
  beginShape();
  pts.forEach(pt=>{let s=p(pt[0],pt[1],pt[2]);vertex(s[0],s[1])});
  endShape(CLOSE);
}

function draw() {
  background(10, 10, 20);
  translate(width/2, height/2 + 30);
  
  let s = sel;
  
  // === PCB base ===
  quad([
    [-130,0,-75],[130,0,-75],[130,0,75],[100,0,75],[100,0,82],[-130,0,82]
  ], s==='pcb'?[25,45,80]:[13,18,30], s==='pcb'?[40,100,180]:null);
  
  // PCB thickness
  quad([[-130,-4,-75],[130,-4,-75],[130,0,-75],[-130,0,-75]], s==='pcb'?[18,35,65]:[10,14,22], null);
  quad([[130,-4,-75],[130,-4,75],[130,0,75],[130,0,-75]], s==='pcb'?[15,30,55]:[8,12,18], null);
  
  // Gold edge connectors
  for(let i=-12;i<12;i++){
    let x1=i*8+2,x2=i*8+6;
    let col=s==='pcb'?[200,180,100]:[170,150,70];
    quad([[x1,0,75],[x2,0,75],[x2,0,78],[x1,0,78]], col, null);
  }
  
  // Mounting holes
  [[-115,-60],[115,-60],[115,60],[-115,60],[-115,78]].forEach(h=>{
    let c=s==='pcb'?[30,40,60]:[10,12,20];
    let cx=p(h[0],0,h[1]);fill(c[0],c[1],c[2]);noStroke();circle(cx[0],cx[1],6);
    fill(8,8,16);circle(cx[0],cx[1],3);
  });
  
  // === FPGA ===
  let fc = s==='fpga'?[45,75,135]:[28,35,60];
  let fe = s==='fpga'?[60,140,220]:null;
  quad([[-27,-3,-27],[27,-3,-27],[27,-3,27],[-27,-3,27]], fc, fe);
  quad([[-27,0,-27],[27,0,-27],[27,-3,-27],[-27,-3,-27]], s==='fpga'?[35,60,110]:[22,28,48], null);
  quad([[27,-3,-27],[27,-3,27],[27,0,27],[27,0,-27]], s==='fpga'?[30,50,95]:[18,22,40], null);
  // FPGA top marking
  quad([[-24,0,-24],[24,0,-24],[24,0,24],[-24,0,24]], s==='fpga'?[50,85,155]:[30,38,65], null);
  
  // BGA
  if(s==='fpga'||s==='bga'){
    for(let x=-20;x<=20;x+=5) for(let z=-20;z<=20;z+=5){
      let a=p(x,-3,z); fill(s==='bga'?[230,210,130]:[190,170,100]); noStroke(); circle(a[0],a[1],2);
    }
  }
  
  // === LEDs ===
  let lcol = s==='leds'?[0,255,130]:[0,180,100];
  for(let i=0;i<8;i++){
    let lx=-90+i*22;
    let on = sin(frameCount*0.06+i*0.6)>0;
    // Housing
    let hc = s==='leds'?[40,60,80]:[22,22,35];
    quad([[lx-3,-2,-69],[lx+3,-2,-69],[lx+3,-2,-67],[lx-3,-2,-67]], hc, null);
    // LED
    let a=p(lx,0,-68);
    if(on){
      fill(0,255,100); noStroke(); circle(a[0],a[1],5);
      fill(0,255,100,20); circle(a[0],a[1],10);
    } else {
      fill(20,20,30); circle(a[0],a[1],3);
    }
  }
  
  // === USB ===
  quad([[-96,-2,-73],[-74,-2,-73],[-74,-2,-63],[-96,-2,-63]], s==='usb'?[35,55,85]:[20,28,45], s==='usb'?[60,140,220]:null);
  // USB shield
  quad([[-94,-1,-73],[-76,-1,-73],[-76,-1,-75],[-94,-1,-75]], s==='usb'?[80,90,110]:[55,60,70], null);
  // USB pins
  for(let i=-2;i<=2;i++){let a=p(-85+i*3,0,68);fill(s==='usb'?[230,210,130]:[190,170,100]);noStroke();circle(a[0],a[1],1.5)}
  
  // === UART ===
  quad([[-113,-1,-56],[-97,-1,-56],[-97,-1,-44],[-113,-1,-44]], s==='uart'?[35,50,75]:[22,28,45], s==='uart'?[60,150,230]:null);
  // UART pins
  for(let i=-6;i<=6;i+=2){
    let a=p(-105+i,-1,-56),b=p(-105+i,-1,-44);
    fill(140,140,160); noStroke(); circle(a[0],a[1],1.2); circle(b[0],b[1],1.2);
  }
  
  // === Power ===
  quad([[74,-2,-58],[96,-2,-58],[96,-2,-42],[74,-2,-42]], s==='power'?[50,55,75]:[32,35,50], s==='power'?[240,140,60]:null);
  // Heatsink
  for(let i=-7;i<=7;i+=3){
    quad([[76,-1,-50+i-0.7],[94,-1,-50+i-0.7],[94,-1,-50+i+0.7],[76,-1,-50+i+0.7]], s==='power'?[65,70,85]:[50,55,65], null);
  }
  // Caps
  [55,75].forEach(x=>{
    quad([[x-5,-1,-28],[x+5,-1,-28],[x+5,-1,-22],[x-5,-1,-22]], s==='power'?[45,45,65]:[30,30,45], null);
  });
  
  // === Pins ===
  for(let i=-12;i<=12;i++){
    if(abs(i)<3)continue;
    let a=p(i*5+3,-1,65);fill(s==='pins'?[180,200,230]:[140,140,160]);noStroke();circle(a[0],a[1],2);
    let b=p(i*5+3,-1,-65);circle(b[0],b[1],2);
  }
  
  // === Label ===
  fill(60,80,120,80); noStroke();
  let l1=p(0,-3,0); textAlign(CENTER); textSize(9); textFont('monospace');
  fill(60,80,120,60); text('XC7A200T', l1[0], l1[1]+4);
}

function mouseDragged() { rot += (mouseX-pmouseX)*0.008; }
function windowResized() { resizeCanvas(windowWidth,windowHeight); }
</script>
</body>
</html>
